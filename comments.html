<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comments & Feedback - UEW Student Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Open Sans', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 780px; margin: 0 auto; }
        .breadcrumb { margin-bottom: 20px; }
        .breadcrumb a { color: #fff; text-decoration: none; font-size: 0.95rem; padding: 8px 16px; background: rgba(255,255,255,0.2); border-radius: 20px; display: inline-block; transition: all 0.3s ease; cursor: pointer; }
        .breadcrumb a:hover { background: rgba(255,255,255,0.35); transform: translateX(-4px); }
        .page-header { text-align: center; margin-bottom: 30px; }
        .page-header h1 { font-family: 'Roboto', sans-serif; color: #fff; font-size: 2.2rem; font-weight: 700; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); margin-bottom: 8px; }
        .page-header p { color: rgba(255,255,255,0.9); font-size: 1rem; line-height: 1.6; }
        .email-banner { background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.35); border-radius: 12px; padding: 14px 20px; margin-bottom: 28px; display: flex; align-items: center; gap: 12px; color: #fff; font-size: 0.95rem; }
        .email-banner .email-icon { font-size: 1.5rem; flex-shrink: 0; }
        .email-banner a { color: #fff; font-weight: 700; text-decoration: underline; text-underline-offset: 3px; }
        .card { background: #fff; border-radius: 16px; padding: 30px; box-shadow: 0 8px 30px rgba(0,0,0,0.15); margin-bottom: 28px; animation: fadeSlideIn 0.35s ease both; }
        @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
        .card::before { content: ''; display: block; height: 4px; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 4px 4px 0 0; margin: -30px -30px 26px; }
        .card h2 { font-family: 'Roboto', sans-serif; color: #333; font-size: 1.25rem; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.88rem; font-weight: 600; color: #555; margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.04em; }
        .form-group input, .form-group textarea { width: 100%; padding: 13px 16px; border: 2px solid #e8e8e8; border-radius: 10px; font-family: 'Open Sans', sans-serif; font-size: 0.98rem; color: #333; transition: border-color 0.25s, box-shadow 0.25s; background: #fafafa; outline: none; }
        .form-group input:focus, .form-group textarea:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.12); background: #fff; }
        .form-group textarea { resize: vertical; min-height: 120px; line-height: 1.6; }
        .star-rating-group { margin-bottom: 20px; }
        .star-rating-group > label { display: block; font-size: 0.88rem; font-weight: 600; color: #555; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.04em; }
        .stars { display: flex; gap: 6px; flex-direction: row-reverse; justify-content: flex-end; }
        .stars input { display: none; }
        .stars label { font-size: 2rem; color: #ddd; cursor: pointer; transition: color 0.15s, transform 0.15s; text-transform: none; letter-spacing: 0; }
        .stars label:hover, .stars label:hover ~ label, .stars input:checked ~ label { color: #f6c90e; }
        .stars label:hover { transform: scale(1.2); }
        .star-hint { font-size: 0.82rem; color: #aaa; margin-top: 6px; }
        .btn-submit { width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; border: none; border-radius: 10px; font-family: 'Roboto', sans-serif; font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: opacity 0.25s, transform 0.2s, box-shadow 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-submit:hover:not(:disabled) { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 6px 18px rgba(102,126,234,0.4); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .feed-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .feed-header h2 { font-family: 'Roboto', sans-serif; color: #fff; font-size: 1.3rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .comment-count { background: rgba(255,255,255,0.25); color: #fff; font-size: 0.82rem; font-weight: 700; padding: 4px 12px; border-radius: 20px; }
        .comments-loading { text-align: center; color: rgba(255,255,255,0.8); padding: 30px; font-size: 0.95rem; }
        .spinner { width: 36px; height: 36px; border: 4px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .comments-empty { background: rgba(255,255,255,0.15); border-radius: 12px; padding: 36px 20px; text-align: center; color: rgba(255,255,255,0.85); }
        .comments-empty .empty-icon { font-size: 2.8rem; margin-bottom: 10px; }
        .comment-card { background: #fff; border-radius: 14px; padding: 20px 22px; margin-bottom: 14px; box-shadow: 0 3px 12px rgba(0,0,0,0.1); animation: fadeSlideIn 0.3s ease both; }
        .comment-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
        .comment-author { display: flex; align-items: center; gap: 12px; }
        .comment-avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; font-size: 1rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .comment-name { font-family: 'Roboto', sans-serif; font-size: 1rem; font-weight: 700; color: #333; }
        .comment-date { font-size: 0.8rem; color: #aaa; margin-top: 2px; }
        .comment-stars { font-size: 1rem; color: #f6c90e; letter-spacing: 1px; flex-shrink: 0; }
        .comment-stars .no-star { color: #ddd; }
        .comment-body { color: #555; font-size: 0.95rem; line-height: 1.65; border-top: 1px solid #f0f0f0; padding-top: 10px; }
        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #333; color: #fff; padding: 12px 22px; border-radius: 30px; font-size: 0.93rem; font-weight: 600; box-shadow: 0 6px 20px rgba(0,0,0,0.25); transition: transform 0.3s ease, opacity 0.3s ease; opacity: 0; z-index: 999; max-width: 90vw; text-align: center; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { background: #48bb78; }
        .toast.error { background: #e53e3e; }
        .comment-menu { position: relative; flex-shrink: 0; margin-left: auto; }
        .menu-dots { background: none; border: none; cursor: pointer; padding: 4px 6px; border-radius: 6px; color: #bbb; display: flex; flex-direction: column; gap: 3px; align-items: center; transition: background 0.15s; }
        .menu-dots:hover { background: #f3f3f3; color: #888; }
        .menu-dots span { display: block; width: 4px; height: 4px; border-radius: 50%; background: currentColor; }
        .menu-dropdown { display: none; position: absolute; right: 0; top: 110%; background: #fff; border: 1px solid #eee; border-radius: 10px; box-shadow: 0 6px 20px rgba(0,0,0,0.12); min-width: 130px; z-index: 10; overflow: hidden; }
        .menu-dropdown.open { display: block; }
        .menu-dropdown button { width: 100%; text-align: left; background: none; border: none; padding: 10px 14px; font-size: 0.88rem; cursor: pointer; color: #e53e3e; display: flex; align-items: center; gap: 8px; transition: background 0.15s; }
        .menu-dropdown button:hover { background: #fff5f5; }
        @media (max-width: 520px) { .card { padding: 22px 18px; } .card::before { margin: -22px -18px 20px; } .page-header h1 { font-size: 1.7rem; } .stars label { font-size: 1.7rem; } }
    </style>
</head>
